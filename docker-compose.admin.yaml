version: '3.8'

services:
  web-admin:
    build:
      context: .
      dockerfile: packages/web-admin/Dockerfile
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    restart: unless-stopped
    networks:
      - shared

networks:
  shared:
    name: ${COOLIFY_SHARED_NETWORK}
    external: true
