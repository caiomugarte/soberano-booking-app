services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD_HASH: ${SUPER_ADMIN_PASSWORD_HASH}
    networks:
      - default
      - coolify
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      API_BASE_URL: http://api:3000
      MCP_SECRET: ${MCP_SECRET}
    networks:
      - default
      - coolify
    depends_on:
      - api
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_TENANT_SLUG: ${VITE_TENANT_SLUG:-soberano}
    depends_on:
      - api
    restart: unless-stopped

  web-admin:
    build:
      context: .
      dockerfile: packages/web-admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped

networks:
  coolify:
    external: true
