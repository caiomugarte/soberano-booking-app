version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SUPER_ADMIN_JWT_SECRET: ${SUPER_ADMIN_JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD_HASH: ${SUPER_ADMIN_PASSWORD_HASH}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - ${API_INTERNAL_ALIAS:-api-internal}
      shared:
        aliases:
          - ${API_INTERNAL_ALIAS:-api-internal}

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    environment:
      NODE_ENV: production
      API_BASE_URL: http://${API_INTERNAL_ALIAS:-api-internal}:3000
      MCP_SECRET: ${MCP_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      internal:
        aliases:
          - ${MCP_INTERNAL_ALIAS:-mcp-internal}
      shared:
        aliases:
          - ${MCP_INTERNAL_ALIAS:-mcp-internal}

networks:
  internal:
    driver: bridge
  shared:
    name: ${COOLIFY_SHARED_NETWORK}
    external: true
