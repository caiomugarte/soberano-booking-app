version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_TENANT_SLUG: ${VITE_TENANT_SLUG}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    restart: unless-stopped
    networks:
      - shared

networks:
  shared:
    name: ${COOLIFY_SHARED_NETWORK}
    external: true
